<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>TM | Home</title>
        <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="container">

            <div class="nav-wrapper">
                <div class="left-side">
                    <div class="nav-link-wrapper active-nav-link">
                        <a href="index.html">Home</a>
                    </div>
                    <div class="nav-link-wrapper">
                        <a href="about.html">About</a>
                    </div>
                </div>
                <div class="right-side">
                    <div class="brand">
                        TRENT MURCHISON
                    </div>
                </div>
            </div>

            <div class="home-content-wrapper">
                <div class="portfolio-items-wrapper">

                    <div>
                        <a class="portfolio-item-wrapper" href="projects.html">
                            <div class="portfolio-img-background" style="background-image:url(images/Computer.jpg)"></div>
                        
                            <div class="img-text-wrapper">
                                <div class="subtitle">
                                    Past and Current Projects
                                </div>
                            </div>
                        </a>
                    </div>

                    <div>
                        <a class="portfolio-item-wrapper" href="writing.html">
                            <div class="portfolio-img-background" style="background-image:url(images/Blogging.jpg)"></div>
                        
                            <div class="img-text-wrapper">
                                <div class="subtitle">
                                    Writing Pieces
                                </div>
                            </div>
                        </a>
                    </div>

                    <div>
                        <a class="portfolio-item-wrapper" href="contact.html">
                            <div class="portfolio-img-background" style="background-image:url(images/Contact.jpg)"></div>
                        
                            <div class="img-text-wrapper">
                                <div class="subtitle">
                                    Contact
                                </div>
                            </div>
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </body>

    <script>
        const portfolioItems = document.querySelectorAll('.portfolio-item-wrapper');

        portfolioItems.forEach(portfolioItem => {
            portfolioItem.addEventListener('mouseover', () => {
                portfolioItem.childNodes[1].classList.add('image-blur');
            });
            portfolioItem.addEventListener('mouseout', () => {
                portfolioItem.childNodes[1].classList.remove('image-blur');
            });
        });
    </script>
</html>
